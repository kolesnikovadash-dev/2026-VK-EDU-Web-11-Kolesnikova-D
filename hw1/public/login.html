<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="static/css/bootstrap.min.css">
  <link rel="icon" href="static/img/favicon.ico">
  <title>Log In - AskMe</title>
</head>
<body>

<header class="container py-3">
  <div class="row align-items-center">
    <!-- logo -->
    <div class="col-3">
      <h1 class="h3 mb-0">
        <a href="index.html">AskMe</a>
      </h1>
    </div>

    <!-- search -->
    <div class="col-4">
      <div class="d-flex">
        <input class="form-control" type="text" placeholder="Search">
        <a href="ask.html" class="btn btn-success ms-2">ASK!</a>
      </div>
    </div>

    <!-- unauth -->
    <div class="col-5 text-end">
      <a href="login.html">log in</a>
      <a href="signup.html" class="ms-2">register</a>
    </div>
  </div>
</header>

<main class="container mt-3">
  <div class="row">

    <!-- left -->
    <section class="col-8">
      <h2 class="mb-4">Log In</h2>

      <div class="alert alert-danger" role="alert">
        Sorry, wrong password!
      </div>

      <form>
        <div class="mb-3 row">
          <label for="login" class="col-sm-3 col-form-label">Login</label>
          <div class="col-sm-6">
            <input type="text" class="form-control" id="login" placeholder="Enter your login here">
          </div>
        </div>

        <div class="mb-3 row">
          <label for="password" class="col-sm-3 col-form-label">Password</label>
          <div class="col-sm-6">
            <input type="password" class="form-control" id="password" placeholder="********">
          </div>
        </div>

        <div class="mb-3 row">
          <div class="col-sm-6 offset-sm-3">
            <button type="submit" class="btn btn-success">Log in!</button>
          </div>
        </div>

        <div class="row">
          <div class="col-sm-6 offset-sm-3">
            <a href="signup.html">create new account</a>
          </div>
        </div>
      </form>

      <!-- auth state -->
      <!--
      <div class="mt-3">
          <button class="btn btn-outline-danger">Log out</button>
      </div>
      -->
    </section>

    <!-- right -->
    <aside class="col-4">
      <h5>Popular Tags</h5>
      <div class="mb-3">
        <a href="#">perl</a>
        <a href="#" class="ms-1">python</a>
        <a href="#" class="ms-1">TechnoPark</a>
        <a href="#" class="ms-1">MySQL</a>
        <a href="#" class="ms-1">django</a>
        <a href="#" class="ms-1">Mail.ru</a>
      </div>

      <h5>Best Members</h5>
      <div>
        <a href="#">Mr. Freeman</a><br>
        <a href="#">Dr. House</a><br>
        <a href="#">Bender</a><br>
        <a href="#">Queen Victoria</a><br>
        <a href="#">V. Pupkin</a>
      </div>
    </aside>

  </div>
</main>

<footer class="text-center py-4">
  AskMe © 2026
</footer>

<script src="static/js/bootstrap.bundle.min.js"></script>
</body>
</html>

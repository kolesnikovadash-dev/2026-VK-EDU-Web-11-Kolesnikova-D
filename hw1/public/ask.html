<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="static/css/bootstrap.min.css">
    <link rel="icon" href="static/img/favicon.ico">
    <title>Ask Question - AskMe</title>
</head>
<body>

<header class="container py-3">
    <div class="row align-items-center">
        <!-- logo -->
        <div class="col-3">
            <h1 class="h3 mb-0">
                <a href="index.html">AskMe</a>
            </h1>
        </div>

        <!-- search -->
        <div class="col-4">
            <div class="d-flex">
                <input class="form-control" type="text" placeholder="Search">
                <a href="ask.html" class="btn btn-success ms-2">ASK!</a>
            </div>
        </div>

        <!-- user -->
        <div class="col-5">
            <div class="d-flex align-items-center justify-content-end">
                <img src="static/img/avatar.png" alt="avatar" width="50" height="50">
                <div class="ms-2">
                    <div>имя пользователя</div>
                    <div>
                        <a href="settings.html">settings</a>
                        <a href="#" class="ms-2">log out</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>

<main class="container mt-3">
    <div class="row">

        <!-- left -->
        <section class="col-8">

            <h2 class="mb-4">New Question</h2>

            <form>
                <!-- Title -->
                <div class="mb-3">
                    <label class="form-label">Title</label>
                    <input type="text" class="form-control" placeholder="How to build a moon park?">
                </div>

                <!-- Text -->
                <div class="mb-3">
                    <label class="form-label">Text</label>
                    <textarea class="form-control" rows="6" placeholder="Describe your question in detail..."></textarea>
                </div>

                <!-- Tags -->
                <div class="mb-3">
                    <label class="form-label">Tags (max 3)</label>
                    <input type="text" class="form-control" placeholder="space, engineering, moon">
                </div>

                <!-- Error example (для ТЗ можно оставить) -->
                <!--
                <div class="alert alert-danger">
                    Please enter no more than 3 tags
                </div>
                -->

                <!-- Submit -->
                <button type="submit" class="btn btn-success">
                    ASK!
                </button>
            </form>

        </section>

        <!-- right -->
        <aside class="col-4">

            <h5>Popular Tags</h5>
            <div class="mb-3">
                <a href="#">perl</a>
                <a href="#" class="ms-1">python</a>
                <a href="#" class="ms-1">TechnoPark</a>
                <a href="#" class="ms-1">MySQL</a>
                <a href="#" class="ms-1">django</a>
                <a href="#" class="ms-1">Mail.ru</a>
            </div>

            <h5>Best Members</h5>
            <div>
                <a href="#">Mr. Freeman</a><br>
                <a href="#">Dr. House</a><br>
                <a href="#">Bender</a><br>
                <a href="#">Queen Victoria</a><br>
                <a href="#">V. Pupkin</a>
            </div>

        </aside>

    </div>
</main>

<footer class="text-center py-4">
    AskMe © 2026
</footer>

<script src="static/js/bootstrap.bundle.min.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="static/css/bootstrap.min.css">
    <title>AskMe</title>
</head>
<body>

<header class="container">
    <div class="row align-items-center">
        <!-- logo -->
        <div class="col-3">
            <h1 class="h3 mb-0">
                <a href="index.html">AskMe</a>
            </h1>
        </div>

        <!-- search -->
        <div class="col-4">
            <div class="d-flex">
                <input class="form-control" type="text" placeholder="Search">
                <a href="ask.html" class="btn btn-success btn-sm ms-2">ASK!</a>
            </div>
        </div>

        <!-- user -->
        <div class="col-5">
            <div class="d-flex align-items-center">
                <img src="static/img/avatar.png" alt="avatar" width="50" height="50">
                <div class="ms-2">
                    <div>имя пользователя</div>
                    <div>
                        <a href="profile.html">settings</a>
                        <a href="#" class="ms-2">log out</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>

<main class="container mt-3">
    <div class="row">

        <!-- left -->
        <section class="col-8">
            <h2 class="mb-4">New Question</h2>

            <div class="alert alert-danger" role="alert">
                Please enter a title, question text, and no more than 3 tags.
            </div>

            <form>
                <div class="row mb-3">
                    <label for="title" class="col-2 col-form-label">Title</label>
                    <div class="col-10">
                        <input
                            type="text"
                            class="form-control"
                            id="title"
                            placeholder="How to build a moon park?"
                            required
                        >
                    </div>
                </div>

                <div class="row mb-3">
                    <label for="text" class="col-2 col-form-label">Text</label>
                    <div class="col-10">
                        <textarea
                            class="form-control"
                            id="text"
                            rows="10"
                            placeholder="Really, how? Have no idea about it"
                            required
                        ></textarea>
                    </div>
                </div>

                <div class="row mb-3">
                    <label for="tags" class="col-2 col-form-label">Tags</label>
                    <div class="col-10">
                        <input
                            type="text"
                            class="form-control"
                            id="tags"
                            placeholder="moon, park, puzzle"
                            required
                        >
                        <div class="form-text">
                            Enter up to 3 tags, separated by commas.
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-10 offset-2">
                        <button type="submit" class="btn btn-success">ASK!</button>
                    </div>
                </div>
            </form>
        </section>

        <!-- right -->
        <aside class="col-4">
            <h5>Popular Tags</h5>
            <div class="mb-3">
                <a href="#">perl</a>
                <a href="#" class="ms-1">python</a>
                <a href="#" class="ms-1">TechnoPark</a>
                <a href="#" class="ms-1">MySQL</a>
                <a href="#" class="ms-1">django</a>
                <a href="#" class="ms-1">Mail.ru</a>
            </div>

            <h5>Best Members</h5>
            <div>
                <a href="#">user</a>
                <a href="#" class="ms-1">user</a>
                <a href="#" class="ms-1">user</a>
                <a href="#" class="ms-1">user</a>
                <a href="#" class="ms-1">user</a>
            </div>
        </aside>

    </div>
</main>

<script src="static/js/bootstrap.bundle.min.js"></script>

</body>
</html>

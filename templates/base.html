{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="icon" href="{% static 'img/favicon.ico' %}">
    <title>AskMe</title>
</head>
<body>
    <header class="container border-bottom pb-2 mb-3">
        <div class="row align-items-center">
            <!-- logo -->
            <div class="col-12 col-md-3 mb-2 mb-md-0">
                <h1 class="h3 mb-0">
                    <a href="{% url 'index' %}">AskMe</a>
                </h1>
            </div>

            <!-- search -->
            <div class="col-12 col-md-4 mb-2 mb-md-0">
                <div class="d-flex">
                    <input class="form-control" type="text" placeholder="Search">
                    <a href="{% url 'ask' %}" class="btn btn-success ms-2">Ask</a>
                </div>
            </div>

            <!-- user -->
            <div class="col-12 col-md-5">
                <div class="d-flex align-items-center justify-content-md-end">
                    <img src="{% static 'img/avatar.png' %}" alt="avatar" width="50" height="50">
                    <div class="ms-2">
                        <div>имя пользователя</div>
                        <div>
                            <a href="{% url 'profile' %}">settings</a>
                            <a href="#" class="ms-2">log out</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container mt-3">
        <div class="row">
            <!-- left -->
            <section class="col-12 col-md-8">
                {% block content %}{% endblock %}
            </section>
            <!-- right -->
            <aside class="col-12 col-md-4">

                <h5>Popular Tags</h5>
                <div class="mb-3">
                    <a href="#">perl</a>
                    <a href="#" class="ms-1">python</a>
                    <a href="#" class="ms-1">TechnoPark</a>
                    <a href="#" class="ms-1">MySQL</a>
                    <a href="#" class="ms-1">django</a>
                    <a href="#" class="ms-1">Mail.ru</a>
                </div>

                <h5>Best Members</h5>
                <div>
                    <a href="#">Mr. Freeman</a><br>
                    <a href="#">Dr. House</a><br>
                    <a href="#">Bender</a><br>
                    <a href="#">Queen Victoria</a><br>
                    <a href="#">V. Pupkin</a>
                </div>

            </aside>
        </div>
    </main>
</body>
</html>

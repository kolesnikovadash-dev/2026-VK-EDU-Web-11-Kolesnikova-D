<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="static/css/bootstrap.min.css">
  <link rel="icon" href="static/img/favicon.ico">
  <title>Settings — AskMe</title>
</head>
<body>

<!-- header -->
<header class="container border-bottom pb-2 mb-3">
  <div class="row align-items-center">
    <!-- logo -->
    <div class="col-12 col-md-3 mb-2 mb-md-0">
      <h1 class="h3 mb-0">
        <a href="index.html">AskMe</a>
      </h1>
    </div>

    <!-- search -->
    <div class="col-12 col-md-4 mb-2 mb-md-0">
      <div class="d-flex">
        <input class="form-control" type="text" placeholder="Search">
        <a href="ask.html" class="btn btn-success btn-sm ms-2">ASK!</a>
      </div>
    </div>

    <!-- user -->
    <div class="col-12 col-md-5">
      <div class="d-flex align-items-center justify-content-md-end">
        <img src="static/img/avatar.png" alt="avatar" width="50" height="50">
        <div class="ms-2">
          <div>Dr. Pepper</div>
          <div>
            <a href="settings.html">settings</a>
            <a href="#" class="ms-2">log out</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- main -->
<main class="container mt-3">
  <div class="row">

    <!-- left content -->
    <section class="col-12 col-md-8">
      <h2 class="mb-4">Settings: Dr. Pepper</h2>

      <form>

        <!-- Login -->
        <div class="mb-3 row">
          <label class="col-12 col-md-3 col-form-label">Login</label>
          <div class="col-12 col-md-9">
            <input type="text" class="form-control" value="dr_pepper">
          </div>
        </div>

        <!-- Email -->
        <div class="mb-3 row">
          <label class="col-12 col-md-3 col-form-label">Email</label>
          <div class="col-12 col-md-9">
            <input type="email" class="form-control" value="drpepper@mail.ru">
          </div>
        </div>

        <!-- Nickname -->
        <div class="mb-3 row">
          <label class="col-12 col-md-3 col-form-label">NickName</label>
          <div class="col-12 col-md-9">
            <input type="text" class="form-control" value="Dr. Pepper">
          </div>
        </div>

        <!-- Avatar -->
        <div class="mb-3 row">
          <label class="col-12 col-md-3 col-form-label">Upload avatar</label>
          <div class="col-12 col-md-9">
            <img src="static/img/avatar.png" alt="avatar" width="100" height="100" class="mb-2 d-block">
            <input type="file" class="form-control">
          </div>
        </div>

        <!-- Button -->
        <div class="text-start">
          <button class="btn btn-dark">Save</button>
        </div>

      </form>
    </section>

    <!-- sidebar -->
    <aside class="col-12 col-md-4">
      <h5>Popular Tags</h5>
      <div class="mb-3">
        <a href="#">perl</a>
        <a href="#" class="ms-1">python</a>
        <a href="#" class="ms-1">TechnoPark</a>
        <a href="#" class="ms-1">MySQL</a>
        <a href="#" class="ms-1">django</a>
        <a href="#" class="ms-1">Mail.ru</a>
      </div>

      <h5>Best Members</h5>
      <div>
        <a href="#">Mr. Freeman</a><br>
        <a href="#">Dr. House</a><br>
        <a href="#">Bender</a><br>
        <a href="#">Queen Victoria</a><br>
        <a href="#">V. Pupkin</a>
      </div>
    </aside>

  </div>
</main>

<!-- footer -->
<footer class="container mt-4 mb-3 text-center text-muted small border-top pt-2">
  AskMe © 2026
</footer>

<script src="static/js/bootstrap.bundle.min.js"></script>

</body>
</html>

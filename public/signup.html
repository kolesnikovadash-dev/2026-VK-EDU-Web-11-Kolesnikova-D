<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="static/css/bootstrap.min.css">
  <link rel="icon" href="static/img/favicon.ico">
  <title>Registration - AskMe</title>
</head>
<body>

<header class="container border-bottom pb-2 mb-3">
  <div class="row align-items-center">
    <!-- logo -->
    <div class="col-12 col-md-3 mb-2 mb-md-0">
      <h1 class="h3 mb-0">
        <a href="index.html">AskMe</a>
      </h1>
    </div>

    <!-- search -->
    <div class="col-12 col-md-4 mb-2 mb-md-0">
      <div class="d-flex">
        <input class="form-control" type="text" placeholder="Search">
        <a href="ask.html" class="btn btn-success ms-2">ASK!</a>
      </div>
    </div>

    <!-- unauth -->
    <div class="col-12 col-md-5 text-md-end">
      <a href="login.html">log in</a>
      <a href="signup.html" class="ms-2">register</a>
    </div>
  </div>
</header>

<main class="container mt-3">
  <div class="row">

    <!-- left -->
    <section class="col-12 col-md-8">
      <h2 class="mb-4">Registration</h2>

      <div class="alert alert-danger">
        This email is already registered
      </div>

      <form>
        <!-- Email -->
        <div class="mb-3 row">
          <label class="col-12 col-md-3 col-form-label">Email</label>
          <div class="col-12 col-md-6">
            <input type="email" class="form-control" placeholder="example@mail.com">
          </div>
        </div>

        <!-- Nickname -->
        <div class="mb-3 row">
          <label class="col-12 col-md-3 col-form-label">NickName</label>
          <div class="col-12 col-md-6">
            <input type="text" class="form-control" placeholder="Your nickname">
          </div>
        </div>

        <!-- Password -->
        <div class="mb-3 row">
          <label class="col-12 col-md-3 col-form-label">Password</label>
          <div class="col-12 col-md-6">
            <input type="password" class="form-control">
          </div>
        </div>

        <!-- Repeat password -->
        <div class="mb-3 row">
          <label class="col-12 col-md-3 col-form-label">Repeat password</label>
          <div class="col-12 col-md-6">
            <input type="password" class="form-control">
          </div>
        </div>

        <!-- Avatar -->
        <div class="mb-3 row">
          <label class="col-12 col-md-3 col-form-label">Upload avatar</label>
          <div class="col-12 col-md-6">
            <input type="file" class="form-control">
          </div>
        </div>

        <!-- кнопка -->
        <div class="mb-3 row">
          <div class="col-12 col-md-6 offset-md-3">
            <button type="submit" class="btn btn-success">
              Register!
            </button>
          </div>
        </div>
      </form>
    </section>

    <!-- right -->
    <aside class="col-12 col-md-4">
      <h5>Popular Tags</h5>
      <div class="mb-3">
        <a href="#">perl</a>
        <a href="#" class="ms-1">python</a>
        <a href="#" class="ms-1">TechnoPark</a>
        <a href="#" class="ms-1">MySQL</a>
        <a href="#" class="ms-1">django</a>
        <a href="#" class="ms-1">Mail.ru</a>
      </div>

      <h5>Best Members</h5>
      <div>
        <a href="#">Mr. Freeman</a><br>
        <a href="#">Dr. House</a><br>
        <a href="#">Bender</a><br>
        <a href="#">Queen Victoria</a><br>
        <a href="#">V. Pupkin</a>
      </div>
    </aside>

  </div>
</main>

<footer class="container mt-4 mb-3 text-center text-muted small border-top pt-2">
  AskMe © 2026
</footer>

<script src="static/js/bootstrap.bundle.min.js"></script>
</body>
</html>

{% extends 'base.html' %}
{% load static %}

{% block title %}Questions{% endblock %}

{% block content %}
    {% include 'includes/question_card.html' %}

    <h2>Ответы:</h2>

    {% for answer in answers %}
        <div class="row border p-3 mb-3">
            <div class="col-3 text-center">
                <img src="{% static 'img/avatar.png' %}" alt="avatar" width="60" height="60">

                <div class="d-flex justify-content-center align-items-center mt-2">
                    <span>{{ answer.rating }}</span>
                    <div class="d-flex flex-column ms-2">
                        <button class="btn btn-outline-secondary btn-sm mb-1">▲</button>
                        <button class="btn btn-outline-secondary btn-sm">▼</button>
                    </div>
                </div>
            </div>

            <div class="col-9">
                <p>{{ answer.text }}</p>

                <p class="text-muted small">replied 2 hours ago</p>
            </div>
        </div>
    {% endfor %}

{% endblock %}
